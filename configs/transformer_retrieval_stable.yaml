paths:
  processed_data_dir: data/processed
  model_output_dir: artifacts/models
  index_output_dir: artifacts/faiss
  report_output_dir: artifacts/reports

files:
  interactions_train: interactions_train.parquet
  interactions_val: interactions_val.parquet
  interactions_test: interactions_test.parquet
  users: users.parquet
  items: items.parquet
  user_id_map: user_id_map.parquet
  item_id_map: item_id_map.parquet

model:
  model_type: transformer
  embedding_dim: 128
  user_id_embedding_dim: 64
  item_id_embedding_dim: 64
  feature_hidden_dim: 128
  projection_hidden_dim: 256
  dropout: 0.05
  temperature: 0.07
  transformer_layers: 1
  transformer_heads: 2
  transformer_ffn_dim: 512
  sequence_pooling: mean

train:
  random_seed: 42
  device: auto
  train_batch_size: 256
  eval_batch_size: 512
  num_workers: 0
  history_length: 50
  learning_rate: 0.0002
  weight_decay: 0.000001
  epochs: 10
  amp_enabled: true
  max_grad_norm: 1.0
  scheduler: warmup_cosine
  scheduler_t_max: 10
  scheduler_patience: 2
  scheduler_factor: 0.5
  min_learning_rate: 0.00001
  warmup_steps: 200

mlflow_tracking_uri: sqlite:///mlflow.db
mlflow_artifact_root: ./mlruns
mlflow_experiment_name: movielens-two-tower
mlflow_ui_host: 127.0.0.1
mlflow_ui_port: 5000
mlflow_ui_url: http://127.0.0.1:5000
