name: CI

on:
	push:
		branches: ["**"]
	pull_request:

jobs:
	quality:
		runs-on: ubuntu-latest
		steps:
			- name: Checkout
				uses: actions/checkout@v4

			- name: Setup Python 3.12
				uses: actions/setup-python@v5
				with:
					python-version: "3.12"

			- name: Setup uv
				uses: astral-sh/setup-uv@v5

			- name: Sync dependencies
				run: uv sync --extra dev

			- name: Ruff
				run: uv run ruff check .

			- name: MyPy
				run: uv run mypy src

			- name: Pytest
				run: uv run pytest -q
